# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     457571552620255233       # Set this to the ID of your Wokwi project (the number from the project's URL)
  title:        "TT's TT"      # Project title
  author:       "Terdoo Osu"      # Your name
  discord:      "TTOsu#2350"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Nothing"      # One line description of what your project does
  language:     "Wokwi" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000       # Clock frequency in Hz (or 0 if not applicable)

